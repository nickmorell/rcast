name: Build and Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

env:
  APP_NAME: rcast

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        BUILD_TARGET: [ release ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Cache Cargo registry, git deps, and the build target dir to speed up builds
      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build in ${{ matrix.BUILD_TARGET }} mode
        run: cargo build --profile ${{ matrix.BUILD_TARGET }}

      - name: Run tests in ${{ matrix.BUILD_TARGET }} mode
        run: cargo test --profile ${{ matrix.BUILD_TARGET }}

      # Upload the compiled binary as an artifact so the release job can use it
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: target/${{ matrix.BUILD_TARGET }}/${{ env.APP_NAME }}

  release:
    name: Publish GitHub Release
    # Only run the release job on direct pushes to main/master (i.e. merged PRs), not on PRs themselves
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    needs: build # Wait for the build job to succeed first
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to create a GitHub release

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Download the binary that was uploaded by the build job
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: ./${{ env.APP_NAME }}

      # Make the binary executable before attaching it to the release
      - name: Make binary executable
        run: chmod +x ./${{ env.APP_NAME }}/${{ env.APP_NAME }}

      # Creates a GitHub release using the short commit SHA as the release name
      # The binary is attached directly to the release as a downloadable asset
      - name: Publish release to GitHub
        run: |
          gh release create "${{ github.sha }}" \
            --title "Release ${{ github.sha }}" \
            --generate-notes \
            ./${{ env.APP_NAME }}/${{ env.APP_NAME }}#${{ env.APP_NAME }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}