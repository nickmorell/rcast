name: Release

on:
  # Validate version on release branch PRs
  pull_request:
    branches:
      - master
    paths:
      - 'Cargo.toml'

  # Build and draft a release when a version tag is pushed (admins only)
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  # -- Semver validation (release/v* PRs only) -----------------------------------
  validate-version:
    name: Validate version
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      startsWith(github.head_ref, 'release/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: cargo_version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Cargo.toml version: $VERSION"

      - name: Validate semver format
        run: |
          VERSION="${{ steps.cargo_version.outputs.version }}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "❌ '$VERSION' is not valid semver. Expected MAJOR.MINOR.PATCH (e.g. 0.2.0)"
            exit 1
          fi
          echo "✅ Version format valid: $VERSION"

      - name: Check version is higher than last release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NEW="${{ steps.cargo_version.outputs.version }}"
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 1 \
            --json tagName --jq '.[0].tagName // ""')

          if [ -z "$LATEST" ]; then
            echo "ℹ️  No existing releases found — any version is acceptable."
            exit 0
          fi

          LATEST_VER="${LATEST#v}"
          echo "Last release: $LATEST_VER  →  New: $NEW"

          HIGHER=$(printf '%s\n%s' "$LATEST_VER" "$NEW" | sort -V | tail -1)
          if [ "$HIGHER" != "$NEW" ] || [ "$NEW" = "$LATEST_VER" ]; then
            echo "❌ $NEW is not strictly higher than the last release ($LATEST_VER)."
            exit 1
          fi
          echo "✅ $NEW is higher than $LATEST_VER"

      - name: Validate branch name matches version
        run: |
          BRANCH="${{ github.head_ref }}"
          VERSION="${{ steps.cargo_version.outputs.version }}"
          EXPECTED="release/v${VERSION}"
          if [ "$BRANCH" != "$EXPECTED" ]; then
            echo "❌ Branch '$BRANCH' does not match version $VERSION."
            echo "Expected branch name: $EXPECTED"
            exit 1
          fi
          echo "✅ Branch name matches version"

  # -- Windows build -------------------------------------------------------------
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Rename binary
        run: cp target/x86_64-pc-windows-msvc/release/rcast.exe rcast-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcast-windows.exe
          path: rcast-windows.exe

  # -- macOS build ---------------------------------------------------------------
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build universal binary
        run: |
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/rcast \
            target/x86_64-apple-darwin/release/rcast \
            -output target/release/rcast

      - name: Bundle into .app
        run: cargo bundle --release

      - name: Package .app into .dmg
        run: |
          mkdir -p dmg_staging
          cp -r "target/release/bundle/osx/RCast.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "RCast" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            rcast-macos.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rcast-macos.dmg
          path: rcast-macos.dmg

  # -- Create draft release ------------------------------------------------------
  draft-release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs: [ build-windows, build-macos ]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml
        run: |
          TAG_VER="${{ github.ref_name }}"
          TAG_VER="${TAG_VER#v}"
          CARGO_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$TAG_VER" != "$CARGO_VER" ]; then
            echo "❌ Tag ($TAG_VER) does not match Cargo.toml ($CARGO_VER)"
            exit 1
          fi
          echo "✅ Tag matches Cargo.toml: $TAG_VER"

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: rcast-windows.exe

      - name: Download macOS dmg
        uses: actions/download-artifact@v4
        with:
          name: rcast-macos.dmg

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: RCast ${{ github.ref_name }}
          body: |
            ## What's new

            <!-- Add release notes here before publishing -->

            ---

            ## Installation

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows | `rcast-windows.exe` | Download and run directly |
            | macOS | `rcast-macos.dmg` | Open the dmg, drag RCast to Applications |

            **macOS:** On first launch right-click → Open to bypass Gatekeeper.
          files: |
            rcast-windows.exe
            rcast-macos.dmg