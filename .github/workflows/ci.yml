name: CI

on:
  pull_request:
    branches:
      - main
    paths:
      # Only run when code or dependencies change.
      # Docs-only PRs (README, CHANGELOG, etc.) are skipped automatically.
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/ci.yml'

  # Allow manually triggering a build on any PR via the Actions tab.
  # Useful for docs PRs where you want to force a compilation check.
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --target ${{ matrix.target }}

      - name: Check for warnings
        # Treat warnings as errors so they don't accumulate unnoticed.
        # RUSTFLAGS is set per-step so it doesn't affect the build step above.
        run: cargo check --target ${{ matrix.target }}
        env:
          RUSTFLAGS: -D warnings